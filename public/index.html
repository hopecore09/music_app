<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Store</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body class="bg-light" style="padding-bottom:100px;">

<div id="app">
  <nav class="navbar navbar-expand bg-white shadow-sm mb-3">
    <div class="container-fluid">
      <div class="d-flex flex-wrap align-items-center gap-3 w-100">
        <div class="d-flex align-items-center gap-2">
          <label class="fw-bold small text-secondary m-0">Language</label>
          <select id="locale" class="form-select form-select-sm" style="width:140px;"></select>
        </div>
        
        <div class="d-flex align-items-center gap-2">
          <label class="fw-bold small text-secondary m-0">Seed</label>
          <input type="number" id="seed" class="form-control form-control-sm" style="width:140px;" value="0">
          <button id="randomSeed" class="btn btn-outline-secondary btn-sm"><i class="fas fa-dice"></i></button>
        </div>
        
        <div class="d-flex align-items-center gap-2">
          <label class="fw-bold small text-secondary m-0">Likes</label>
          <input type="range" id="likes" class="form-range" min="0" max="10" step="0.1" value="5" style="width:150px;">
          <span id="likesVal" class="fw-bold small" style="min-width:35px;">5.0</span>
        </div>
        
        <div class="d-flex align-items-center gap-2">
          <label class="fw-bold small text-secondary m-0">Reviews</label>
          <input type="range" id="reviews" class="form-range" min="0" max="10" step="0.1" value="3" style="width:150px;">
          <span id="reviewsVal" class="fw-bold small" style="min-width:35px;">3.0</span>
        </div>
        
        <div class="ms-auto">
          <div class="btn-group btn-group-sm">
            <button id="tableViewBtn" class="btn btn-primary active">Table</button>
            <button id="galleryViewBtn" class="btn btn-outline-primary">Gallery</button>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <div class="container-fluid pb-5">
    <div id="tableContainer">
      <div class="table-responsive bg-white rounded shadow-sm">
        <table class="table table-hover table-bordered mb-0">
          <thead class="table-light">
            <tr><th>#</th><th>Title</th><th>Artist</th><th>Album</th><th>Genre</th></tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
      <div id="tablePagination" class="bg-white rounded-bottom shadow-sm py-3 mt-0">
        <div class="d-flex justify-content-center gap-3 align-items-center">
          <button id="prevPage" class="btn btn-outline-secondary btn-sm">Prev</button>
          <span id="pageInfo" class="text-secondary">Page 1</span>
          <button id="nextPage" class="btn btn-outline-secondary btn-sm">Next</button>
        </div>
      </div>
    </div>

    <div id="galleryContainer" class="d-none">
      <div id="galleryGrid" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-3"></div>
      <div id="loading" class="text-center py-5 d-none">
        <div class="spinner-border text-primary"></div>
      </div>
    </div>
  </div>

  <div id="playerBar" class="fixed-bottom d-none" style="background:#181818; color:white; padding:12px 20px; z-index:1000; bottom:0;">
    <div class="d-flex align-items-center" style="max-width:900px; margin:0 auto; gap:16px;">
      <div class="d-flex align-items-center gap-3" style="width:30%; min-width:180px; max-width:250px; flex-shrink:0;">
        <img id="playerCover" src="" alt="" class="rounded" style="width:56px; height:56px; object-fit:cover;">
        <div style="overflow:hidden; min-width:0;">
          <div id="playerTitle" class="fw-semibold text-truncate" style="font-size:14px;">-</div>
          <div id="playerArtist" class="text-secondary text-truncate" style="font-size:12px;">-</div>
        </div>
      </div>
      
      <div class="flex-grow-1" style="min-width:200px; max-width:500px;">
        <div class="d-flex justify-content-center align-items-center gap-3">
          <button id="playerPrev" class="btn btn-link text-secondary p-0 border-0"><i class="fas fa-step-backward"></i></button>
          <button id="playerPlay" class="btn btn-success rounded-circle d-flex align-items-center justify-content-center" style="width:44px; height:44px;">
            <i class="fas fa-play"></i>
          </button>
          <button id="playerNext" class="btn btn-link text-secondary p-0 border-0"><i class="fas fa-step-forward"></i></button>
        </div>
        <div class="d-flex align-items-center gap-2 mt-1">
          <span id="playerCurrent" class="text-secondary" style="font-size:11px; min-width:36px;">0:00</span>
          <input type="range" id="playerProgress" class="form-range flex-grow-1" min="0" max="1" step="0.001" value="0" style="height:4px; padding:0;">
          <span id="playerDuration" class="text-secondary" style="font-size:11px; min-width:36px;">0:00</span>
        </div>
      </div>
      
      <div style="width:30%; min-width:100px; max-width:180px; flex-shrink:0;"></div>
    </div>
  </div>
</div>

<script type="module" src="/js/app.js"></script>
</body>
</html>
